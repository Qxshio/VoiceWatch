<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Watch browser help</title>
    <link rel="stylesheet" href="help.css">
  </head>
  <body>
    <main>
      <header>
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1 id="title">Browser setup help</h1>
          <p id="summary"></p>
          <p><a id="extensions-link" href="#" target="_blank" rel="noreferrer">Open extensions page</a></p>
        </div>
      </header>

      <section>
        <h2>Enable Developer mode</h2>
        <ol id="steps"></ol>
      </section>

      <section>
        <h2>Then load Voice Watch</h2>
        <ol>
          <li>Choose Load unpacked.</li>
          <li>Select the Voice Watch extension folder shown on the setup page.</li>
          <li>Copy the generated extension ID back into Voice Watch setup.</li>
        </ol>
      </section>

      <div class="actions">
        <button id="back" type="button">Back to setup</button>
      </div>
    </main>

    <script src="help.js"></script>
  </body>
</html>
