<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Watch</title>
    <link rel="stylesheet" href="connect.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1>Voice Watch</h1>
          <p id="connection">Checking desktop connection...</p>
        </div>
      </header>

      <section class="status-grid" aria-label="Voice Watch status">
        <article>
          <span>Desktop</span>
          <strong id="desktop-status">Checking</strong>
          <small id="desktop-detail">Looking for Voice Watch.</small>
        </article>
        <article>
          <span>Voice</span>
          <strong id="voice-status">Unknown</strong>
          <small id="voice-detail">Checking Roblox account status.</small>
        </article>
        <article>
          <span>Last checked</span>
          <strong id="last-checked">--</strong>
          <small id="last-detail">The desktop app controls checks.</small>
        </article>
      </section>

      <section class="actions" aria-label="Connection actions">
        <button id="disconnect" type="button" hidden>Disconnect</button>
      </section>

      <p id="result" aria-live="polite"></p>
    </main>

    <script src="connect.js"></script>
  </body>
</html>
