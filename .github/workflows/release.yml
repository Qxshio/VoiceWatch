name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          node --check extension/service_worker.js
          node --check extension/connect.js
          node --check extension/setup.js
          node --check extension/help.js
          node --check extension/rejoin.js
          node --check extension/rejoin_page.js
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"

      - name: Build release executable
        run: cargo build --release

      - name: Smoke test update handoff
        shell: pwsh
        run: .\scripts\test-update-handoff.ps1

      - name: Package store extensions
        shell: pwsh
        run: .\scripts\package-extensions.ps1

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Locate Inno Setup
        id: inno
        shell: pwsh
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $roots = @(
              "${env:ProgramFiles(x86)}",
              "$env:ProgramFiles",
              "$env:ChocolateyInstall",
              "$env:ProgramData\chocolatey"
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path -LiteralPath $_) }
            $iscc = $roots |
              ForEach-Object { Get-ChildItem -Path $_ -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 } |
              Select-Object -First 1
          }
          if (-not $iscc) {
            throw "Inno Setup Compiler was not found after Chocolatey install."
          }
          $isccPath = if ($iscc.Source) { $iscc.Source } else { $iscc.FullName }
          "iscc_path=$isccPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Using Inno Setup compiler at $isccPath"

      - name: Build installer
        shell: pwsh
        run: |
          $installerArgs = @{
            SkipRustBuild = $true
            IsccPath = "${{ steps.inno.outputs.iscc_path }}"
          }
          if ("${{ vars.VOICE_WATCH_EXTENSION_ID }}") {
            $installerArgs.ExtensionId = "${{ vars.VOICE_WATCH_EXTENSION_ID }}"
          }
          .\scripts\build-installer.ps1 @installerArgs

      - name: Package extension
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          Compress-Archive -Path extension\* -DestinationPath "dist\voice-watch-extension-$version.zip" -Force

      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
              "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
            } | Set-Content -LiteralPath dist\SHA256SUMS.txt -Encoding ASCII

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voice-watch-windows
          path: dist/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "Voice Watch $tag Open Beta"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $title --prerelease
            if ($LASTEXITCODE -ne 0) { throw "Failed to update release metadata." }
            gh release upload $tag dist/* --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload release artifacts." }
          } else {
            gh release create $tag dist/* --title $title --generate-notes --prerelease
            if ($LASTEXITCODE -ne 0) { throw "Failed to create release." }
          }
